apiVersion: apps/v1
kind: Deployment

metadata:
  name: ttt-agent

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ttt-agent

  template:
    metadata:
      labels:
        app: ttt-agent

    spec:
      containers:
      - name: ttt-agent
        image: ttt-mlops:latest

        ports:
        - containerPort: 8000